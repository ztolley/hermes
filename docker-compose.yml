services:
  hermes:
    build:
      context: .
      args:
        # Feel free to override these in your own compose.override.yml
        HERMES_REPO: https://github.com/NousResearch/hermes-agent.git
        HERMES_BRANCH: main
    image: hermes-gateway:latest
    container_name: hermes-gateway
    entrypoint:
      - sh
      - -lc
    depends_on:
      qwen:
        condition: service_healthy
    env_file:
      - .env
    environment:
      HERMES_HOME: /app/.hermes
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_PORT: ${HERMES_GATEWAY_PORT:-8000}
      API_SERVER_KEY: ${HERMES_API_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - |
        mkdir -p /app/.hermes
        envsubst < /app/config.template.yaml > /app/.hermes/config.yaml
        exec hermes gateway
    ports:
      - "${HERMES_GATEWAY_PORT:-8000}:${HERMES_GATEWAY_PORT:-8000}"
    volumes:
      # Persistent Hermes runtime state for this project
      - ./data/hermes/home:/app/.hermes
      # Template for the generated Hermes runtime config
      - ./settings/hermes/config.yaml:/app/config.template.yaml:ro
      # Project-local SSH material for host command execution
      - ./secrets/ssh:/root/.ssh:ro
      # Optional: forward your SSH agent socket when SSH_AUTH_SOCK is set
      # - ${SSH_AUTH_SOCK}:/ssh-agent.socket
    # environment:
    #   SSH_AUTH_SOCK: /ssh-agent.socket
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - >
          python -c "import os, sys, urllib.request;
          url = 'http://127.0.0.1:%s/health' % os.environ.get('HERMES_GATEWAY_PORT', '8000');
          sys.exit(0 if urllib.request.urlopen(url, timeout=5).status == 200 else 1)"
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 60s

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    depends_on:
      hermes:
        condition: service_healthy
    environment:
      OPENAI_API_BASE_URL: http://hermes:${HERMES_GATEWAY_PORT:-8000}/v1
      OPENAI_API_KEY: ${HERMES_API_KEY}
    ports:
      - "${OPEN_WEBUI_PORT:-3000}:8080"
    volumes:
      - ./data/open-webui:/app/backend/data
    restart: unless-stopped

  qwen:
    image: avarok/dgx-vllm-nvfp4-kernel:v23
    container_name: vllm-qwen-coder
    environment:
      MODEL: ${QWEN_MODEL:-saricles/Qwen3-Coder-Next-NVFP4-GB10}
      HOST: 0.0.0.0
      PORT: ${QWEN_PORT:-3001}
      TENSOR_PARALLEL_SIZE: ${QWEN_TENSOR_PARALLEL_SIZE:-1}
      GPU_MEMORY_UTIL: ${QWEN_GPU_MEMORY_UTILIZATION:-0.7}
      MAX_MODEL_LEN: ${QWEN_MAX_MODEL_LEN:-131072}
      MAX_NUM_SEQS: ${QWEN_MAX_NUM_SEQS:-2}
      VLLM_EXTRA_ARGS: >-
        --enable-prefix-caching
        --trust-remote-code
        --generation-config vllm
        --max-parallel-loading-workers 1
        --enable-auto-tool-choice
        --tool-call-parser qwen3_coder
      HF_HOME: /root/.cache/huggingface
      HF_TOKEN: ${HF_TOKEN}
      PYTHONUNBUFFERED: "1"
      VLLM_USE_FLASHINFER_MOE_FP4: ${QWEN_USE_FLASHINFER_MOE_FP4:-0}
      VLLM_FLASHINFER_MOE_BACKEND: ${QWEN_FLASHINFER_MOE_BACKEND:-throughput}
      VLLM_TEST_FORCE_FP8_MARLIN: ${QWEN_TEST_FORCE_FP8_MARLIN:-1}
      VLLM_NVFP4_GEMM_BACKEND: ${QWEN_NVFP4_GEMM_BACKEND:-marlin}
      VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"
    volumes:
      - ./data/qwen/huggingface:/root/.cache/huggingface
      - ./data/qwen/vllm:/root/.cache/vllm
      - ./data/qwen/flashinfer:/root/.cache/flashinfer
      - ./data/qwen/triton:/root/.triton
      - ./data/qwen/tmp:/tmp
    ports:
      - "${QWEN_PORT:-3001}:${QWEN_PORT:-3001}"
    # restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: 64gb
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${QWEN_PORT:-3001}/v1/models >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 40
      start_period: 600s
    ulimits:
      memlock: -1
      stack: 67108864

  qwen-autocomplete:
    image: ${AUTOCOMPLETE_IMAGE:-vllm-node:latest}
    pull_policy: never
    container_name: qwen-autocomplete
    environment:
      HF_HOME: /root/.cache/huggingface
      HF_TOKEN: ${HF_TOKEN}
      HF_HUB_DISABLE_XET: "1"
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./data/qwen/huggingface:/root/.cache/huggingface
      - ./data/qwen-autocomplete/vllm:/root/.cache/vllm
      - ./data/qwen-autocomplete/flashinfer:/root/.cache/flashinfer
      - ./data/qwen-autocomplete/triton:/root/.triton
      - ./data/qwen-autocomplete/tmp:/tmp
    ports:
      - "${AUTOCOMPLETE_PORT:-3002}:30000"
    command:
      - bash
      - -lc
      - >-
        unset VLLM_BASE_DIR &&
        exec vllm serve ${AUTOCOMPLETE_MODEL:-Qwen/Qwen2.5-Coder-3B}
        --host 0.0.0.0
        --port 30000
        --gpu-memory-utilization ${AUTOCOMPLETE_GPU_MEMORY_UTILIZATION:-0.08}
        --max-model-len ${AUTOCOMPLETE_MAX_MODEL_LEN:-4096}
        --generation-config vllm
        --load-format fastsafetensors
        --attention-backend flashinfer
        --tensor-parallel-size ${AUTOCOMPLETE_TP_SIZE:-1}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: 8gb
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python3 -c "import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:30000/v1/models', timeout=5).read()"
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 900s
    stop_grace_period: 5m
    ulimits:
      memlock: -1
      stack: 67108864
