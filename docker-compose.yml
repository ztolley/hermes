services:
  hermes:
    build:
      context: .
      args:
        # Feel free to override these in your own compose.override.yml
        HERMES_REPO: https://github.com/NousResearch/hermes-agent.git
        HERMES_BRANCH: main
    image: hermes-gateway:latest
    container_name: hermes-gateway
    entrypoint:
      - sh
      - -lc
    depends_on:
      qwen:
        condition: service_healthy
    env_file:
      - .env
    environment:
      HERMES_HOME: /app/.hermes
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_PORT: ${HERMES_GATEWAY_PORT:-8000}
      API_SERVER_KEY: ${HERMES_API_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - |
        mkdir -p /app/.hermes
        envsubst < /app/config.template.yaml > /app/.hermes/config.yaml
        exec hermes gateway
    ports:
      - "${HERMES_GATEWAY_PORT:-8000}:${HERMES_GATEWAY_PORT:-8000}"
    volumes:
      # Persistent Hermes runtime state for this project
      - ./data/hermes/home:/app/.hermes
      # Template for the generated Hermes runtime config
      - ./settings/hermes/config.yaml:/app/config.template.yaml:ro
      # Project-local SSH material for host command execution
      - ./secrets/ssh:/root/.ssh:ro
      # Optional: forward your SSH agent socket when SSH_AUTH_SOCK is set
      # - ${SSH_AUTH_SOCK}:/ssh-agent.socket
    # environment:
    #   SSH_AUTH_SOCK: /ssh-agent.socket
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - >
          python -c "import os, sys, urllib.request;
          url = 'http://127.0.0.1:%s/health' % os.environ.get('HERMES_GATEWAY_PORT', '8000');
          sys.exit(0 if urllib.request.urlopen(url, timeout=5).status == 200 else 1)"
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 60s

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    depends_on:
      hermes:
        condition: service_healthy
    environment:
      OPENAI_API_BASE_URL: http://hermes:${HERMES_GATEWAY_PORT:-8000}/v1
      OPENAI_API_KEY: ${HERMES_API_KEY}
      WEBUI_URL: http://localhost:${OPEN_WEBUI_PORT:-3000}
      ENABLE_IMAGE_GENERATION: ${OPENWEBUI_ENABLE_IMAGE_GENERATION:-false}
      IMAGE_GENERATION_ENGINE: ${OPENWEBUI_IMAGE_GENERATION_ENGINE:-openai}
      IMAGE_GENERATION_MODEL: ${OPENWEBUI_IMAGE_GENERATION_MODEL:-}
      IMAGE_SIZE: ${OPENWEBUI_IMAGE_SIZE:-auto}
      IMAGES_OPENAI_API_BASE_URL: ${OPENWEBUI_IMAGES_OPENAI_API_BASE_URL:-https://api.openai.com/v1}
      IMAGES_OPENAI_API_KEY: ${OPENWEBUI_IMAGES_OPENAI_API_KEY:-}
      IMAGES_OPENAI_API_PARAMS: ${OPENWEBUI_IMAGES_OPENAI_API_PARAMS:-{}}
      WHISPER_MODEL: ${OPENWEBUI_WHISPER_MODEL:-base}
      WHISPER_VAD_FILTER: ${OPENWEBUI_WHISPER_VAD_FILTER:-false}
      WHISPER_LANGUAGE: ${OPENWEBUI_WHISPER_LANGUAGE:-}
      WHISPER_COMPUTE_TYPE: ${OPENWEBUI_WHISPER_COMPUTE_TYPE:-int8}
    ports:
      - "${OPEN_WEBUI_PORT:-3000}:8080"
    volumes:
      - ./data/open-webui:/app/backend/data
      - ./data/open-webui/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data/open-webui/nginx.conf.d:/etc/nginx/conf.d:ro
    restart: unless-stopped

  qwen:
    image: avarok/dgx-vllm-nvfp4-kernel:v23
    container_name: vllm-qwen-coder
    environment:
      MODEL: ${QWEN_MODEL:-saricles/Qwen3-Coder-Next-NVFP4-GB10}
      HOST: 0.0.0.0
      PORT: ${QWEN_PORT:-3001}
      TENSOR_PARALLEL_SIZE: ${QWEN_TENSOR_PARALLEL_SIZE:-1}
      GPU_MEMORY_UTIL: ${QWEN_GPU_MEMORY_UTIL_V2:-0.7}
      MAX_MODEL_LEN: ${QWEN_MAX_MODEL_LEN_V2:-131072}
      MAX_NUM_SEQS: ${QWEN_MAX_NUM_SEQS:-2}
      VLLM_EXTRA_ARGS: >-
        --enable-prefix-caching
        --trust-remote-code
        --generation-config vllm
        --max-parallel-loading-workers 1
        --enable-auto-tool-choice
        --tool-call-parser qwen3_coder
        ${QWEN_SPECULATIVE_ARGS:-}
      HF_HOME: /root/.cache/huggingface
      HF_TOKEN: ${HF_TOKEN}
      PYTHONUNBUFFERED: "1"
      VLLM_USE_FLASHINFER_MOE_FP4: ${QWEN_USE_FLASHINFER_MOE_FP4:-0}
      VLLM_FLASHINFER_MOE_BACKEND: ${QWEN_FLASHINFER_MOE_BACKEND:-throughput}
      VLLM_TEST_FORCE_FP8_MARLIN: ${QWEN_TEST_FORCE_FP8_MARLIN:-1}
      VLLM_NVFP4_GEMM_BACKEND: ${QWEN_NVFP4_GEMM_BACKEND:-marlin}
      VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"
    volumes:
      - ./data/qwen/huggingface:/root/.cache/huggingface
      - ./data/qwen/vllm:/root/.cache/vllm
      - ./data/qwen/flashinfer:/root/.cache/flashinfer
      - ./data/qwen/triton:/root/.triton
      - ./data/qwen/tmp:/tmp
    ports:
      - "${QWEN_PORT:-3001}:${QWEN_PORT:-3001}"
    # restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: 64gb
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${QWEN_PORT:-3001}/v1/models >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 100
      start_period: 1200s
    ulimits:
      memlock: -1
      stack: 67108864

  qwen-vl:
    profiles: ["vision"]
    image: ${QWEN_VL_IMAGE:-avarok/dgx-vllm-nvfp4-kernel:v23}
    container_name: vllm-qwen-vl
    environment:
      MODEL: ${QWEN_VL_MODEL:-Qwen/Qwen3-VL-8B-Instruct-FP8}
      HOST: 0.0.0.0
      PORT: ${QWEN_VL_PORT:-3003}
      TENSOR_PARALLEL_SIZE: ${QWEN_VL_TENSOR_PARALLEL_SIZE:-1}
      GPU_MEMORY_UTIL: ${QWEN_VL_GPU_MEMORY_UTIL_V2:-0.16}
      MAX_MODEL_LEN: ${QWEN_VL_MAX_MODEL_LEN_V2:-32768}
      MAX_NUM_SEQS: ${QWEN_VL_MAX_NUM_SEQS:-1}
      VLLM_EXTRA_ARGS: >-
        --trust-remote-code
        --generation-config vllm
        --max-parallel-loading-workers 1
        --limit-mm-per-prompt.image ${QWEN_VL_IMAGE_LIMIT:-1}
        --mm-processor-cache-gb ${QWEN_VL_MM_PROCESSOR_CACHE_GB:-1}
        ${QWEN_VL_EXTRA_ARGS:-}
      HF_HOME: /root/.cache/huggingface
      HF_TOKEN: ${HF_TOKEN}
      PYTHONUNBUFFERED: "1"
      VLLM_WORKER_MULTIPROC_METHOD: spawn
    volumes:
      - ./data/qwen-vl/huggingface:/root/.cache/huggingface
      - ./data/qwen-vl/vllm:/root/.cache/vllm
      - ./data/qwen-vl/flashinfer:/root/.cache/flashinfer
      - ./data/qwen-vl/triton:/root/.triton
      - ./data/qwen-vl/tmp:/tmp
    ports:
      - "${QWEN_VL_PORT:-3003}:${QWEN_VL_PORT:-3003}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: 16gb
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${QWEN_VL_PORT:-3003}/v1/models >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 40
      start_period: 600s
    ulimits:
      memlock: -1
      stack: 67108864
