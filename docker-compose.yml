services:
  hermes:
    build:
      context: .
      args:
        # Feel free to override these in your own compose.override.yml
        HERMES_REPO: https://github.com/NousResearch/hermes-agent.git
        HERMES_BRANCH: main
    image: hermes-gateway:latest
    container_name: hermes-gateway
    entrypoint:
      - sh
      - -lc
    depends_on:
      qwen:
        condition: service_healthy
    env_file:
      - .env
    environment:
      HERMES_HOME: /app/.hermes
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_PORT: ${HERMES_GATEWAY_PORT:-8000}
      API_SERVER_KEY: ${HERMES_API_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - |
        mkdir -p /app/.hermes
        envsubst < /app/config.template.yaml > /app/.hermes/config.yaml
        exec hermes gateway
    ports:
      - "${HERMES_GATEWAY_PORT:-8000}:${HERMES_GATEWAY_PORT:-8000}"
    volumes:
      # Persistent Hermes runtime state for this project
      - ./data/hermes/home:/app/.hermes
      # Template for the generated Hermes runtime config
      - ./settings/hermes/config.yaml:/app/config.template.yaml:ro
      # Project-local SSH material for host command execution
      - ./secrets/ssh:/root/.ssh:ro
      # Optional: forward your SSH agent socket when SSH_AUTH_SOCK is set
      # - ${SSH_AUTH_SOCK}:/ssh-agent.socket
    # environment:
    #   SSH_AUTH_SOCK: /ssh-agent.socket
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - >
          python -c "import os, sys, urllib.request;
          url = 'http://127.0.0.1:%s/health' % os.environ.get('HERMES_GATEWAY_PORT', '8000');
          sys.exit(0 if urllib.request.urlopen(url, timeout=5).status == 200 else 1)"
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 60s

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    depends_on:
      hermes:
        condition: service_healthy
    environment:
      OPENAI_API_BASE_URL: http://hermes:${HERMES_GATEWAY_PORT:-8000}/v1
      OPENAI_API_KEY: ${HERMES_API_KEY}
    ports:
      - "${OPEN_WEBUI_PORT:-3000}:8080"
    volumes:
      - ./data/open-webui:/app/backend/data
    restart: unless-stopped

  qwen:
    build:
      context: ./vendor/qwen-build
      dockerfile: Dockerfile
      args:
        TORCH_CUDA_ARCH_LIST: "12.1a"
    image: vllm-qwen:latest
    container_name: vllm-qwen-coder
    command:
      - bash
      - -lc
      - >
        vllm serve saricles/Qwen3-Coder-Next-NVFP4-GB10
        --speculative-config.model togethercomputer/Aurora-Spec-Qwen3-Coder-Next-FP8
        --speculative-config.num_speculative_tokens 4
        --gpu-memory-utilization 0.7
        --max-model-len 131072
        --max-num-seqs 2
        --max-parallel-loading-workers 1
        --load-format safetensors
        --enable-prefix-caching
        --port 9000
        --host 0.0.0.0
        --port ${QWEN_PORT:-9000}
        --tensor-parallel-size ${QWEN_TENSOR_PARALLEL_SIZE:-1}
        --trust-remote-code
    environment:
      HF_HOME: /var/cache/huggingface
      HF_TOKEN: ${HF_TOKEN}
      PYTHONUNBUFFERED: "1"
      VLLM_FLASHINFER_ALLREDUCE_BACKEND: trtllm
      VLLM_NVFP4_GEMM_BACKEND: marlin
      VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"
    volumes:
      - ./data/qwen/huggingface:/var/cache/huggingface
      - ./data/qwen/vllm:/root/.cache/vllm
      - ./data/qwen/flashinfer:/root/.cache/flashinfer
      - ./data/qwen/triton:/root/.triton
      - ./data/qwen/tmp:/tmp
    ports:
      - "${QWEN_PORT:-9000}:${QWEN_PORT:-9000}"
    # restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: 64gb
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${QWEN_PORT:-9000}/v1/models >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 200
      start_period: 3000s
    ulimits:
      memlock: -1
      stack: 67108864
